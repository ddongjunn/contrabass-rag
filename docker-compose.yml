# 봇 서버 + pgvector를 한 번에 올리는 구성.
# 시크릿은 같은 디렉터리의 .env에서 주입(.env.example 참고). docker compose가 자동 로드.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contrabass_rag
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # 최초 기동 시 01-schema.sql 자동 실행
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d contrabass_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB 접속 (컨테이너 네트워크 내 'db' 호스트)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/contrabass_rag
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme}
      # 시크릿 (이미지에 굽지 않고 런타임 주입)
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY 를 .env에 설정하세요}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
