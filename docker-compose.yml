# 봇 서버 + pgvector를 한 번에 올리는 구성.
# 시크릿은 같은 디렉터리의 .env에서 주입(.env.example 참고). docker compose가 자동 로드.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contrabass_rag
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro   # 최초 기동 시 01-schema.sql 자동 실행
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d contrabass_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB 접속 (컨테이너 네트워크 내 'db' 호스트)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/contrabass_rag
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme}
      # 시크릿 (이미지에 굽지 않고 런타임 주입)
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY 를 .env에 설정하세요}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      # 브라우저 크로스오리진 허용 목록(app.cors.allowed-origins). 위젯을 임베드하는 포털의
      # origin을 콤마로 구분해 넣는다. 비우면 CORS 미적용 — 포털에서의 호출이 전부 차단된다.
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-}
      # cb_common MySQL (INVENTORY 트랙 — 미설정 시 비활성)
      RESOURCE_INVENTORY_ENABLED: ${RESOURCE_INVENTORY_ENABLED:-false}
      DP_COMMON_URL: ${DP_COMMON_URL:-}
      DP_COMMON_USER_NAME: ${DP_COMMON_USER_NAME:-}
      DP_COMMON_PASSWORD: ${DP_COMMON_PASSWORD:-}
      CB_PROVIDER_UUID: ${CB_PROVIDER_UUID:-}
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
