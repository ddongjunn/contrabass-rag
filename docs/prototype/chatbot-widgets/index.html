<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CONTRABASS Chat · 집계 시각화 목업</title>
<style>
  :root {
    color-scheme: light;
    --page-bg: #eef1f6;
    --ink: #2a2f36;
    --ink-2: #565e6b;
    --muted: #868e9b;
    --panel: #ffffff;
    --panel-2: #f7f9fc;
    --line: #e6eaf0;
    --line-2: #f0f3f8;
    --accent: #1f7bf2;
    --accent-dark: #1467d9;
    --accent-soft: #e9f2ff;
    --brand: #f36c21;
    --brand-dark: #d95b16;
    --brand-soft: #fff3ea;
    --good: #10a568;
    --good-soft: #e4f6ee;
    --warn: #e0930a;
    --warn-soft: #fdf0d6;
    --crit: #e34b3f;
    --crit-soft: #fce2df;
    --shadow-sm: 0 1px 1px rgba(23,33,54,.04), 0 2px 4px rgba(23,33,54,.04);
    --shadow-md: 0 1px 2px rgba(23,33,54,.04), 0 4px 8px rgba(23,33,54,.045), 0 12px 22px rgba(23,33,54,.06);
    --shadow-lg: 0 1px 2px rgba(23,33,54,.05), 0 8px 18px rgba(23,33,54,.07), 0 22px 44px rgba(23,33,54,.10), 0 44px 88px rgba(23,33,54,.09);
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    margin: 0; color: var(--ink);
    background:
      radial-gradient(1100px 620px at 12% -8%, rgba(31,123,242,.10), transparent 60%),
      radial-gradient(880px 520px at 108% 6%, rgba(243,108,33,.08), transparent 55%),
      var(--page-bg);
  }
  button, textarea { font: inherit; }
  button { cursor: pointer; }
  button:focus-visible, textarea:focus-visible { outline: 3px solid rgba(31,123,242,.28); outline-offset: 2px; }

  .demo-surface { min-height: 100vh; display: grid; place-items: center; padding: 40px 20px; }
  .demo-inner { text-align: center; max-width: 560px; }
  .demo-mark {
    display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(48,53,58,.10); border-radius: 12px;
    padding: 12px 18px; background: rgba(255,255,255,.75); backdrop-filter: blur(6px); box-shadow: var(--shadow-sm);
    color: var(--brand); font-weight: 800; letter-spacing: .04em; font-size: 13px; margin-bottom: 22px;
  }
  .demo-mark::before { content: ""; width: 9px; height: 9px; border-radius: 3px; background: var(--brand); box-shadow: 0 0 0 4px var(--brand-soft); }
  .demo-inner h2 { font-size: 24px; margin: 0 0 10px; letter-spacing: -.01em; text-wrap: balance; }
  .demo-inner p { color: var(--ink-2); font-size: 14.5px; line-height: 1.65; margin: 0 auto 24px; max-width: 46ch; }
  .try-chips { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; }
  .try-chips button {
    border: 1px solid var(--line); background: rgba(255,255,255,.85); border-radius: 24px;
    padding: 9px 16px; font-size: 13px; color: var(--ink-2); box-shadow: var(--shadow-sm); transition: all .16s ease;
  }
  .try-chips button:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .chat-widget { position: fixed; right: 26px; bottom: 26px; z-index: 50; display: flex; flex-direction: column; align-items: flex-end; }
  .chat-launcher {
    display: inline-flex; align-items: center; gap: 10px; min-width: 116px; height: 50px; padding: 0 20px;
    border: 0; border-radius: 26px; color: #fff; background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    box-shadow: var(--shadow-lg); font-weight: 700; transition: transform .16s ease;
  }
  .chat-launcher:hover { transform: translateY(-2px); }
  .chat-widget[data-open="true"] .chat-launcher { display: none; }
  .launcher-glyph { width: 16px; height: 16px; border: 2px solid currentColor; border-radius: 5px; }

  .chat-panel {
    display: none; flex-direction: column; width: 424px; max-width: calc(100vw - 32px);
    height: 664px; max-height: calc(100vh - 52px);
    background: var(--panel); border: 1px solid rgba(230,234,240,.9); border-radius: 22px; overflow: hidden; box-shadow: var(--shadow-lg);
    transform-origin: bottom right; animation: pop .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: none; } }
  .chat-widget[data-open="true"] .chat-panel { display: flex; }

  .chat-header {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 16px 18px; border-bottom: 1px solid var(--line-2);
    background: linear-gradient(180deg, rgba(31,123,242,.04), transparent);
  }
  .chat-header .brand-row { display: flex; align-items: center; gap: 10px; }
  .chat-header .logo { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--brand), #ff9350); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px; box-shadow: var(--shadow-sm); }
  .chat-header .chat-kicker { margin: 0; font-size: 10.5px; font-weight: 800; letter-spacing: .1em; color: var(--brand); }
  .chat-header h1 { margin: 1px 0 0; font-size: 16px; letter-spacing: -.01em; }
  .header-status { font-size: 11px; color: var(--good); display: flex; align-items: center; gap: 5px; margin-top: 3px; }
  .header-status i { width: 6px; height: 6px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 3px var(--good-soft); }
  .icon-button { border: 0; background: transparent; font-size: 22px; color: var(--muted); line-height: 1; width: 34px; height: 34px; border-radius: 10px; }
  .icon-button:hover { background: var(--line-2); }

  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; background: var(--panel-2); }
  .chat-messages::-webkit-scrollbar { width: 8px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #d7dde6; border-radius: 8px; border: 2px solid var(--panel-2); }

  .message { display: flex; animation: rise .32s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .message, .chat-panel { animation: none; } }
  .message[data-role="user"] { justify-content: flex-end; }
  .message[data-role="assistant"] { align-items: flex-start; gap: 10px; }

  /* chatbot profile avatar in front of chat */
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex: none; margin-top: 2px;
    background: linear-gradient(135deg, var(--brand), #ff9350);
    box-shadow: var(--shadow-sm); display: grid; place-items: center;
  }
  .avatar svg { width: 18px; height: 18px; }

  .bubble { font-size: 14px; line-height: 1.55; }
  .message[data-role="user"] .bubble {
    max-width: 90%;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff;
    padding: 10px 15px; border-radius: 18px 18px 6px 18px; box-shadow: var(--shadow-sm);
  }
  .message[data-role="assistant"] .bubble { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
  .say { background: var(--panel); border: 1px solid var(--line-2); padding: 11px 14px; border-radius: 6px 16px 16px 16px; box-shadow: var(--shadow-sm); }
  .say .em, .cap .em { font-weight: 700; color: var(--accent); }

  .typing { align-self: flex-start; display: inline-flex; gap: 5px; padding: 13px 16px; background: var(--panel); border: 1px solid var(--line-2); border-radius: 6px 16px 16px 16px; box-shadow: var(--shadow-sm); }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .5; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,60%,100% { opacity:.3; transform: translateY(0);} 30% { opacity:1; transform: translateY(-2px);} }

  .sources { display: flex; flex-wrap: wrap; gap: 6px; }
  .source-chip { font-size: 11px; color: var(--ink-2); background: var(--line-2); border-radius: 20px; padding: 4px 10px; }

  /* ===== combined card: caption(chat) + widget together in ONE card ===== */
  .card {
    background: linear-gradient(180deg, #ffffff, #fdfefe);
    border: 1px solid var(--line); border-radius: 6px 16px 16px 16px; padding: 15px 16px;
    box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.9);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.9); }
  .cap { font-size: 14px; line-height: 1.55; color: var(--ink); }
  .card-divider { height: 1px; background: var(--line-2); margin: 13px -16px; }
  .card-title { font-size: 12.5px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title .meta { font-size: 11px; font-weight: 500; color: var(--muted); }

  .rank { display: flex; flex-direction: column; gap: 13px; margin-top: 13px; }
  .rank-row { display: grid; grid-template-columns: 20px 1fr; gap: 10px; align-items: start; }
  .rank-row .idx { font-size: 11px; color: var(--muted); font-family: var(--mono); text-align: center; padding-top: 2px; }
  .rank-inner { display: grid; grid-template-columns: 1fr auto; gap: 5px 10px; }
  .rank-inner .nm { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-inner .val { font-family: var(--mono); font-weight: 700; font-size: 13.5px; text-align: right; font-variant-numeric: tabular-nums; }
  .rank-inner .bar { grid-column: 1 / -1; height: 8px; border-radius: 6px; background: var(--line); overflow: hidden; }
  .rank-inner .bar > i { display: block; height: 100%; border-radius: 6px; }
  .rank-inner .prj { grid-column: 1 / -1; font-size: 10.5px; color: var(--muted); margin-top: -1px; }

  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-top: 13px; }
  .kpi { background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line); border-radius: 14px; padding: 13px; }
  .kpi .k { font-size: 11px; color: var(--muted); }
  .kpi .n { font-size: 24px; font-weight: 800; font-family: var(--mono); margin-top: 3px; display: flex; align-items: baseline; gap: 4px; font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
  .kpi .n small { font-size: 11px; font-weight: 600; color: var(--muted); }
  .chip { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 9px; border-radius: 20px; margin-top: 8px; }
  .chip.good { color: var(--good); background: var(--good-soft); }
  .chip.warn { color: var(--warn); background: var(--warn-soft); }
  .chip.crit { color: var(--crit); background: var(--crit-soft); }
  .wide { grid-column: 1 / -1; }
  .trendbox { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px; padding: 12px 13px; }
  .trendbox .th { display: flex; justify-content: space-between; align-items: center; font-size: 11.5px; color: var(--ink-2); margin-bottom: 6px; }
  .metrics-box { border: 1px solid var(--line); border-radius: 14px; padding: 4px 14px; background: var(--panel); }
  .metric-mini { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line-2); }
  .metric-mini:last-child { border-bottom: 0; }
  .metric-mini .ml { font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .metric-mini .ml b { width: 8px; height: 8px; border-radius: 3px; }
  .metric-mini .track { flex: 1; max-width: 130px; height: 8px; border-radius: 6px; background: var(--line); overflow: hidden; }
  .metric-mini .track > i { display: block; height: 100%; border-radius: 6px; }
  .metric-mini .mv { font-family: var(--mono); font-weight: 700; font-size: 12.5px; width: 44px; text-align: right; font-variant-numeric: tabular-nums; }

  .count-card { display: flex; align-items: center; gap: 16px; margin-top: 13px; }
  .count-card .big { font-size: 40px; font-weight: 800; font-family: var(--mono); line-height: 1; background: linear-gradient(135deg, var(--accent), #56a0ff); -webkit-background-clip: text; background-clip: text; color: transparent; font-variant-numeric: tabular-nums; }
  .count-card .lbl { font-size: 14px; font-weight: 700; }
  .count-card .sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

  .followups { display: flex; flex-wrap: wrap; gap: 7px; }
  .fu { font-size: 12px; color: var(--accent); border: 1px solid var(--line); background: var(--panel); border-radius: 20px; padding: 7px 13px; box-shadow: var(--shadow-sm); transition: all .15s ease; }
  .fu:hover { background: var(--accent-soft); transform: translateY(-1px); }

  .card-foot { margin-top: 13px; font-size: 11px; color: var(--muted); }
  .prom { font-family: var(--mono); background: var(--line-2); padding: 2px 7px; border-radius: 6px; font-size: 10px; }

  .chat-form { display: flex; gap: 9px; padding: 14px; border-top: 1px solid var(--line-2); align-items: flex-end; background: var(--panel); }
  .chat-form textarea { flex: 1; resize: none; border: 1px solid var(--line); border-radius: 14px; padding: 11px 14px; max-height: 120px; background: var(--panel-2); }
  .send-button { border: 0; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; font-weight: 700; border-radius: 14px; padding: 0 18px; height: 44px; box-shadow: var(--shadow-sm); }
  .send-button:hover { filter: brightness(1.05); }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
</style>
</head>
<body>
  <main class="demo-surface">
    <div class="demo-inner">
      <div class="demo-mark">CONTRABASS</div>
      <h2>RAG 챗봇 · 집계 시각화 목업</h2>
      <p>실제 <code>chat-widget</code> 브랜드 위에 RESOURCE 응답을 시각 위젯으로 렌더링한 데모입니다. 챗봇 설명과 그래프 카드는 <b>하나의 카드</b>로 합쳐지고, 답변 앞에는 <b>챗봇 프로필</b>이 붙습니다.</p>
      <div class="try-chips">
        <button data-q="cpu">CPU 제일 높은 인스턴스 5개</button>
        <button data-q="summary">전체 자원 현황 요약해줘</button>
        <button data-q="net">네트워크 송신량 TopN</button>
        <button data-q="volume">볼륨 몇 개야?</button>
        <button data-q="doc">스냅샷 생성 API 알려줘</button>
      </div>
    </div>
  </main>

  <section class="chat-widget" data-open="true">
    <button class="chat-launcher" type="button" aria-label="채팅 열기"><span class="launcher-glyph" aria-hidden="true"></span><span>Chat</span></button>
    <div class="chat-panel" role="dialog" aria-label="CONTRABASS assistant">
      <header class="chat-header">
        <div class="brand-row">
          <div class="logo">C</div>
          <div>
            <p class="chat-kicker">CONTRABASS</p>
            <h1>Assistant</h1>
            <div class="header-status"><i></i>Prometheus · cb_common 연결됨</div>
          </div>
        </div>
        <button class="icon-button" type="button" data-chat-close aria-label="닫기">×</button>
      </header>
      <div class="chat-messages" data-chat-messages></div>
      <form class="chat-form" data-chat-form>
        <label class="sr-only" for="chat-input">질문</label>
        <textarea id="chat-input" data-chat-input rows="1" placeholder="메트릭·자원 현황을 물어보세요"></textarea>
        <button class="send-button" type="submit">전송</button>
      </form>
    </div>
  </section>

<script>
(function () {
  const widget = document.querySelector(".chat-widget");
  const launcher = document.querySelector(".chat-launcher");
  const closeBtn = document.querySelector("[data-chat-close]");
  const form = document.querySelector("[data-chat-form]");
  const input = document.querySelector("[data-chat-input]");
  const msgs = document.querySelector("[data-chat-messages]");

  launcher.addEventListener("click", () => widget.dataset.open = "true");
  closeBtn.addEventListener("click", () => widget.dataset.open = "false");
  input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }});
  form.addEventListener("submit", e => { e.preventDefault(); const q = input.value.trim(); if (!q) return; input.value=""; ask(q); });
  document.querySelectorAll(".try-chips button").forEach(b => b.addEventListener("click", () => { widget.dataset.open="true"; askKey(b.dataset.q, b.textContent); }));

  const sev = p => p >= 85 ? "var(--crit)" : p >= 70 ? "var(--warn)" : "var(--good)";
  const grad = c => `linear-gradient(90deg, color-mix(in srgb, ${c} 72%, #fff), ${c})`;
  const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
  function scroll(){ msgs.scrollTop = msgs.scrollHeight; }
  const AVATAR = `<div class="avatar" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="7" width="16" height="12" rx="4" fill="#fff"/><circle cx="9.2" cy="13" r="1.6" fill="#f36c21"/><circle cx="14.8" cy="13" r="1.6" fill="#f36c21"/><path d="M12 3.5v3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="3" r="1.5" fill="#fff"/></svg></div>`;

  function userMsg(text) { const r = el("div","message"); r.dataset.role="user"; const b=el("div","bubble"); b.textContent=text; r.append(b); msgs.append(r); scroll(); }
  function typing() {
    const r = el("div","message"); r.dataset.role="assistant";
    r.append(htmlNode(AVATAR));
    const b = el("div","bubble"); b.append(el("div","typing","<span></span><span></span><span></span>"));
    r.append(b); msgs.append(r); scroll(); return r;
  }
  function htmlNode(h){ const d = el("div"); d.innerHTML = h; return d.firstElementChild; }
  function followups(list){ const w = el("div","followups"); list.forEach(t=>{ const c=el("button","fu"); c.textContent=t; c.onclick=()=>ask(t); w.append(c);}); return w; }

  // assistant message with profile avatar; caption(chat) + widget merged into ONE card
  function assistantWidget(capHtml, widgetInnerHtml, fus) {
    const r = el("div","message"); r.dataset.role="assistant";
    r.append(htmlNode(AVATAR));
    const b = el("div","bubble");
    b.append(htmlNode(`<div class="card"><div class="cap">${capHtml}</div><div class="card-divider"></div>${widgetInnerHtml}</div>`));
    if (fus) b.append(followups(fus));
    r.append(b); msgs.append(r); scroll();
  }
  function assistantText(html, sources, fus) {
    const r = el("div","message"); r.dataset.role="assistant";
    r.append(htmlNode(AVATAR));
    const b = el("div","bubble");
    b.append(el("div","say", html));
    if (sources) { const w=el("div","sources"); sources.forEach(s=>{const c=el("span","source-chip");c.textContent=s;w.append(c);}); b.append(w); }
    if (fus) b.append(followups(fus));
    r.append(b); msgs.append(r); scroll();
  }

  // ---- widget INNER builders (no card wrapper; caption card wraps them) ----
  function rankInner(spec) {
    const max = Math.max(...spec.rows.map(r => r.value));
    const rows = spec.rows.map((r,i) => {
      const color = spec.unit === "%" ? sev(r.value) : "var(--accent)";
      return `<div class="rank-row"><span class="idx">${i+1}</span>
        <div class="rank-inner">
          <span class="nm">${r.instanceName}</span>
          <span class="val" style="color:${color}">${r.display}</span>
          <span class="bar"><i style="width:${Math.max(5,(r.value/max)*100).toFixed(0)}%;background:${grad(color)}"></i></span>
          <span class="prj">${r.projectName ?? ""}</span>
        </div></div>`;
    }).join("");
    return `<div class="card-title">${spec.label}이 ${spec.dir} 인스턴스 <span class="meta">최근 ${spec.window}</span></div>
      <div class="rank">${rows}</div>
      <div class="card-foot"><span class="prom">${spec.promql}</span></div>`;
  }

  function dashInner() {
    const mm = [{n:"CPU",v:72},{n:"메모리",v:64},{n:"디스크",v:41},{n:"네트워크",v:58}]
      .map(m => `<div class="metric-mini"><span class="ml"><b style="background:${sev(m.v)}"></b>${m.n}</span>
        <span class="track"><i style="width:${m.v}%;background:${grad(sev(m.v))}"></i></span><span class="mv">${m.v}%</span></div>`).join("");
    const spark = `<div class="trendbox wide">
        <div class="th"><span>CPU 사용률 추이</span><span style="color:var(--crit);font-family:var(--mono);font-weight:700">▲ +8%p</span></div>
        <svg viewBox="0 0 320 54" preserveAspectRatio="none" style="width:100%;height:54px;display:block" role="img" aria-label="CPU 추이 상승">
          <defs><linearGradient id="dg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#1f7bf2" stop-opacity=".22"/><stop offset="1" stop-color="#1f7bf2" stop-opacity="0"/></linearGradient></defs>
          <path d="M0,42 L40,40 L80,43 L120,34 L160,36 L200,27 L240,24 L280,17 L320,12 L320,54 L0,54 Z" fill="url(#dg)"/>
          <path d="M0,42 L40,40 L80,43 L120,34 L160,36 L200,27 L240,24 L280,17 L320,12" fill="none" stroke="#1f7bf2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="320" cy="12" r="3.2" fill="#1f7bf2"/>
        </svg></div>`;
    return `<div class="card-title">클러스터 자원 현황 <span class="meta">최근 5m</span></div>
      <div class="dash-grid">
        <div class="kpi"><div class="k">가동 인스턴스</div><div class="n">128 <small>/ 140</small></div><span class="chip good">91% 정상</span></div>
        <div class="kpi"><div class="k">임계 초과 노드</div><div class="n">2 <small>대</small></div><span class="chip crit">CPU 85%↑</span></div>
        ${spark}
        <div class="metrics-box wide">${mm}</div>
      </div>
      <div class="card-foot"><span class="prom">avg by(resource)(...)</span></div>`;
  }

  function countInner(spec) {
    return `<div class="count-card"><div class="big">${spec.total}</div>
      <div><div class="lbl">${spec.label} ${spec.total}건</div><div class="sub">${spec.cond}</div></div></div>`;
  }

  const RESP = {
    cpu: () => assistantWidget(
      `<span class="em">CPU 사용률</span>이 높은 인스턴스 상위 5개예요. web-prod-07은 임계치(85%)를 넘었습니다.`,
      rankInner({ label:"CPU 사용률", dir:"높은", window:"5m", promql:"topk(5, ...cpu...)", unit:"%",
        rows:[
          {instanceName:"web-prod-07", projectName:"service-prod", value:91.2, display:"91.2%"},
          {instanceName:"api-prod-02", projectName:"service-prod", value:87.0, display:"87.0%"},
          {instanceName:"batch-11",    projectName:"data-platform", value:73.4, display:"73.4%"},
          {instanceName:"cache-03",    projectName:"service-prod", value:61.9, display:"61.9%"},
          {instanceName:"web-prod-04", projectName:"service-prod", value:58.1, display:"58.1%"},
        ]}),
      ["web-prod-07 메모리는?", "이 프로젝트만 보기", "네트워크 송신량 TopN"]),
    net: () => assistantWidget(
      `<span class="em">네트워크 송신량</span>이 높은 인스턴스입니다.`,
      rankInner({ label:"네트워크 송신량", dir:"높은", window:"5m", promql:"topk(5, rate(...tx...[5m]))", unit:"B/s",
        rows:[
          {instanceName:"gw-edge-01", projectName:"network", value:842, display:"842 MB/s"},
          {instanceName:"web-prod-07", projectName:"service-prod", value:410, display:"410 MB/s"},
          {instanceName:"stream-05", projectName:"media", value:296, display:"296 MB/s"},
          {instanceName:"api-prod-02", projectName:"service-prod", value:120, display:"120 MB/s"},
        ]}),
      ["수신량도 보여줘", "전체 자원 현황 요약해줘"]),
    summary: () => assistantWidget(
      `전반적으로 안정적이지만 <span class="em">노드 2대</span>가 CPU 임계치를 넘었어요.`,
      dashInner(),
      ["임계 초과 노드 상세", "CPU 제일 높은 인스턴스 5개"]),
    volume: () => assistantWidget(
      `조건에 맞는 볼륨 개수예요.`,
      countInner({ total: 342, label:"볼륨", cond:"상태=available · 프로젝트 전체" }),
      ["스냅샷은 몇 개야?", "in-use 볼륨만"]),
    doc: () => assistantText(
      `인스턴스 스냅샷 생성은 <span class="em">POST /api/v1/compute/instances/{id}/snapshots</span> 입니다. 요청 본문에 <code>name</code>이 필요하고, 응답으로 스냅샷 UUID를 반환합니다.`,
      ["Compute-API-Guide #12", "snapshot-runbook #3"], ["볼륨 스냅샷 API는?"]),
  };

  function askKey(key, questionText) {
    userMsg(questionText); const t = typing();
    setTimeout(() => { t.remove(); (RESP[key] || fallback)(); }, 620);
  }
  function ask(text) { userMsg(text); const t = typing(); setTimeout(() => { t.remove(); route(text); }, 620); }
  function route(text) {
    const q = text.toLowerCase();
    if (/(cpu|씨피유)/.test(q)) return RESP.cpu();
    if (/(요약|현황|전체|summary|대시)/.test(q)) return RESP.summary();
    if (/(네트워크|송신|network|tx)/.test(q)) return RESP.net();
    if (/(메모리|memory)/.test(q)) return RESP.cpu();
    if (/(볼륨|volume|개수|몇)/.test(q)) return RESP.volume();
    if (/(api|스냅샷|문서|가이드|어떻게|알려)/.test(q)) return RESP.doc();
    fallback();
  }
  function fallback() { assistantText(`질문 유형이 명확하지 않아요. 예: "CPU 제일 높은 인스턴스 5개", "볼륨 몇 개야?", "전체 자원 현황 요약".`); }

  assistantText(`무엇을 도와드릴까요? 인프라 지표나 자원 현황을 물어보시면 표·차트로 보여드립니다.`);
})();
</script>
</body>
</html>
