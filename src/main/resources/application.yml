spring:
  application:
    name: ragbot

  # --- 아웃바운드 HTTP 타임아웃 — OpenAI RestClient에 적용(TimeLimiter 대신 시간 제한) ---
  http:
    client:
      connect-timeout: 5s
      read-timeout: 60s

  # --- DB (PostgreSQL + pgvector) ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:contrabass_rag}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}

  # --- Spring AI ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}            # 환경변수만 (Moderation도 재사용)
      chat:
        options:
          model: ${app.openai.chat-model}
      embedding:
        options:
          model: ${app.openai.embedding-model}
    # ChatClient 자동구성 비활성 — provider 교체 여지 위해 ChatModel로 수동 빈 구성(generation)
    chat:
      client:
        enabled: false
    # 재시도는 Resilience4j로 통합 예정(M4) → 내장 재시도 비활성(이중 재시도 방지)
    retry:
      max-attempts: 1
    vectorstore:
      pgvector:
        initialize-schema: false          # 테이블은 db/init/01-schema.sql이 생성. 앱은 만들지 않음
        schema-name: public
        table-name: documents
        index-type: hnsw
        distance-type: COSINE_DISTANCE
        dimensions: ${app.openai.embedding-dim}

# --- 애플리케이션 튜닝값 (단일 소스, @ConfigurationProperties로 매핑 예정) ---
app:
  llm:
    provider: openai
  openai:
    chat-model: gpt-4o-mini                  # 비용 최소 우선
    embedding-model: text-embedding-3-small  # 1536, 색인과 동일 고정
    embedding-dim: 1536
  retrieval:
    top-k: 5
    min-score: 0.32                           # 실측(2026-06-04): 정상 ≥0.376 / 무관 ≤0.263 사이값
    table: documents                          # 읽기 전용 (색인 적재는 별도)
    source-keys:
      title: title
      page: page
      chunk: chunk_index                     # 근거 청크 위치(개발자 검증용) — 출처에 'title #chunk' 형태로 표기
  cache:                                      # ⏸ 고도화 보류(Phase 4) — 설정만 유지, 1차 미구현
    enabled: true
    cosine-threshold: 0.95
    # table:                                  # 이 앱 소유 — 고도화 착수 시 기입
  guard:
    max-question-len: 1000
    rate-per-min: 5                           # 사용자(Slack user_id)별 분당 한도 — RateLimiterRegistry 키별 적용(M5)
    moderation:
      enabled: true
      model: omni-moderation-latest
    banned-words-path: classpath:banned-words.txt
  slack:
    mode: socket                              # 1차 고정(아웃바운드 WebSocket, 공개 URL·서명검증 불필요)
  router:
    model: gpt-4o-mini                        # 라우팅용 작고 빠른 모델
    temperature: 0.0
    min-confidence: 0.5                        # 미만이면 CLARIFY 폴백
    history-turns: 4                           # 라우터가 LLM에 넘기는 최근 메시지 수(현재 질문 포함).
                                               # 2면 "되물음→짧은 답"에서 원 질문이 잘려 맥락을 잃는다(실측 2026-07-24)
  resource:
    extraction-model: gpt-4o-mini             # 조건추출용 작고 빠른 모델
    temperature: 0.0
    min-confidence: 0.5                        # 미만이면 NeedsClarification 폴백
    default-window: 5m
    default-top-n: 5
    severity:                                   # 위젯 색상 임계치(%) — 프론트는 서버가 준 severity만 신뢰
      warn-percent: 70
      crit-percent: 85
    widgets:
      project-usage-top-n: 10                   # 프로젝트별 바 표시 상한(테넌트가 많으면 채팅창이 덮인다)
    trend:                                      # TREND(시계열 추이, query_range)
      default-range: 1h                         # 질문에 구간이 없을 때
      points: 60                                # 구간을 나눌 목표 포인트 수 → step = range/points (최소 15s)
      max-series: 5                             # 라인 수 상한(초과분은 마지막 값 기준 상위만)
    prometheus:
      base-url: ${PROMETHEUS_URL:}             # env PROMETHEUS_URL (R3에서 필수)
      connect-timeout: 3s
      read-timeout: 10s                        # 무거운 rate+조인 쿼리 타임아웃 고려
      ssl-verify: false                        # 내부망 자체서명 인증서 대응
    catalog:
      INSTANCE_CPU:
        pattern: RATIO_TOPK
        raw-metric: libvirt_domain_info_cpu_time_seconds_total
        unit: "%"
      INSTANCE_MEMORY:
        pattern: GAUGE_TOPK
        raw-metric: libvirt_domain_memory_stats_used_percent
        unit: "%"
      INSTANCE_NETWORK_RX:
        pattern: COUNTER_RATE_TOPK
        raw-metric: libvirt_domain_interface_stats_receive_bytes_total
        unit: "B/s"
      INSTANCE_NETWORK_TX:
        pattern: COUNTER_RATE_TOPK
        raw-metric: libvirt_domain_interface_stats_transmit_bytes_total
        unit: "B/s"
      INSTANCE_DISK_READ:
        pattern: COUNTER_RATE_TOPK
        raw-metric: libvirt_domain_block_stats_read_requests_total
        unit: "req/s"
      INSTANCE_DISK_WRITE:
        pattern: COUNTER_RATE_TOPK
        raw-metric: libvirt_domain_block_stats_write_requests_total
        unit: "req/s"
    inventory:                                 # INVENTORY(cb_common, MySQL) 트랙 — 미설정 시 빈 미생성
      enabled: ${RESOURCE_INVENTORY_ENABLED:false}
      db:                                      # cb_common (MySQL)
        url: ${DP_COMMON_URL:}
        username: ${DP_COMMON_USER_NAME:}
        password: ${DP_COMMON_PASSWORD:}
      provider-uuid: ${CB_PROVIDER_UUID:}      # cb_provider(url~'https://10.255.%') 단일 공급자 uuid를 1회 확인해 주입
      max-rows: 50
      query-timeout-ms: 3000
  cors:
    allowed-origins: []                        # 예: [http://localhost:5173] — 비어있으면 CORS 미적용(기본값 안전)

# --- 회복탄력성 (Resilience4j 통합) ---
# OpenAI 임베딩·생성·모더레이션 공통 인스턴스 'openai'. 시간 제한은 spring.http.client.* 로 처리(TimeLimiter 미사용).
# 사용자별 RateLimiter는 app.guard.rate-per-min 으로 코드에서 RateLimiterConfig 구성(여기 미설정).
resilience4j:
  retry:
    instances:
      prometheus:
        max-attempts: 2
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
      openai:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:                       # 429/5xx → TransientAiException, 타임아웃/IO → ResourceAccessException
          - org.springframework.ai.retry.TransientAiException
          - org.springframework.web.client.ResourceAccessException
  circuitbreaker:
    instances:
      prometheus:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
      openai:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:                      # 백엔드 장애만 실패로 집계(4xx 입력오류는 제외)
          - org.springframework.ai.retry.TransientAiException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - org.springframework.ai.retry.NonTransientAiException

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.okestro.ragbot: INFO
