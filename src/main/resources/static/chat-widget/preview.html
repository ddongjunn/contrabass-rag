<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>위젯 미리보기 (백엔드 없이 확인용)</title>
    <link rel="stylesheet" href="./chat-widget.css">
    <style>
      body { background: #f7f8fa; padding: 24px; }
      .preview-wrap { max-width: 460px; margin: 0 auto; }
      .preview-wrap h1 { font-size: 16px; color: #191f28; margin: 0 0 4px; }
      .preview-wrap p.note { font-size: 12px; color: #8b95a1; margin: 0 0 20px; }
      .scenario { margin-bottom: 22px; }
      .scenario > .label { font-size: 11px; font-weight: 700; color: #8b95a1; margin: 0 0 8px; }
      /* 실제 채팅 렌더와 동일한 어시스턴트 행 모양 재현 */
      .message[data-role="assistant"] { display: flex; }
    </style>
  </head>
  <body>
    <div class="preview-wrap">
      <h1>챗봇 위젯 미리보기</h1>
      <p class="note">백엔드 없이 목업 데이터로 5종 위젯 + 상태를 실제 렌더 코드로 그린 화면입니다.</p>
      <div id="preview"></div>
    </div>

    <script type="module">
      import { mount } from "./render/dom.js";
      import { buildWidget } from "./render/dispatch.js";

      // 각 위젯 타입을 대표하는 목업 응답 (widget-contract.d.ts 규격)
      const scenarios = [
        {
          label: "metric_rank — CPU TopN (%)",
          answer: "CPU 사용률이 높은 인스턴스 상위 4개예요.",
          widgets: [{
            type: "metric_rank", title: "CPU 사용률이 높은 인스턴스", unit: "%", window: "5m", promql: "topk(5, ...)", empty: false,
            rows: [
              { instanceName: "web-prod-07", projectName: "service-prod", value: 91.2, display: "91.2%", severity: "CRIT" },
              { instanceName: "api-prod-02", projectName: "service-prod", value: 87.0, display: "87.0%", severity: "CRIT" },
              { instanceName: "batch-11", projectName: "data-platform", value: 73.4, display: "73.4%", severity: "WARN" },
              { instanceName: "cache-03", projectName: "service-prod", value: 61.9, display: "61.9%", severity: "GOOD" },
            ],
          }],
          followups: ["web-prod-07 메모리는?", "네트워크 송신량 상위 5개"],
        },
        {
          label: "metric_rank — 네트워크 (B/s, severity 없음 → 액센트색)",
          answer: "네트워크 송신량이 높은 인스턴스입니다.",
          widgets: [{
            type: "metric_rank", title: "네트워크 송신량이 높은 인스턴스", unit: "B/s", window: "5m", promql: "topk(5, rate(...tx...[5m]))", empty: false,
            rows: [
              { instanceName: "gw-01", projectName: "network", value: 430182400, display: "410.25 MB/s", severity: null },
              { instanceName: "proxy-02", projectName: "network", value: 244401152, display: "233.10 MB/s", severity: null },
            ],
          }],
          followups: [],
        },
        {
          label: "inventory_count — 개수 카드",
          answer: "볼륨 342건입니다.",
          widgets: [{ type: "inventory_count", label: "볼륨", total: 342, condition: "상태=available · 프로젝트 전체" }],
          followups: ["스냅샷은 몇 개야?"],
        },
        {
          label: "usage_bar — 네트워크별 IP 사용률",
          answer: "네트워크별 IP 사용률입니다 — 상위: 10.255.43.0/24 17.3%, 10.255.42.0/24 7.9%.",
          widgets: [{
            type: "usage_bar", title: "네트워크별 IP 사용률", unit: "%", empty: false, rows: [
              { name: "10.255.43.0/24", value: 17.3, display: "17.3%", severity: "GOOD" },
              { name: "10.255.42.0/24", value: 7.9, display: "7.9%", severity: "GOOD" },
              { name: "auto-cluster-network", value: 3.2, display: "3.2%", severity: "GOOD" },
            ],
          }],
          followups: [],
        },
        {
          label: "usage_bar — 스토리지 용량 (절대량 display)",
          answer: "스토리지 용량입니다 — 상위: Main_Ceph_ceph_01_hdd_dev 3.0%, Ceph 클러스터 2.8%.",
          widgets: [{
            type: "usage_bar", title: "스토리지 용량", unit: "%", empty: false, rows: [
              { name: "Main_Ceph_ceph_01_hdd_dev", value: 3.0, display: "292 GB / 9.6 TB (3.0%)", severity: "GOOD" },
              { name: "Ceph 클러스터", value: 2.8, display: "1.0 TB / 34.8 TB (2.8%)", severity: "GOOD" },
            ],
          }],
          followups: [],
        },
        {
          label: "status_donut — 상태 분포 도넛",
          answer: "인스턴스 상태 분포입니다.",
          widgets: [{
            type: "status_donut", label: "인스턴스", total: 140, segments: [
              { status: "ACTIVE", count: 128, level: "good" },
              { status: "SHUTOFF", count: 9, level: "muted" },
              { status: "ERROR", count: 3, level: "crit" },
            ],
          }],
          followups: ["ERROR 인스턴스 목록"],
        },
        {
          label: "metric_line — CPU 추이 (멀티시리즈)",
          answer: "최근 1h CPU 사용률 추이입니다 — web-prod-07, api-prod-02, batch-11.",
          widgets: [{
            type: "metric_line", title: "CPU 사용률 추이", unit: "%", range: "1h",
            // 실물 쿼리 그대로 — 목업을 줄이면 카드 폭 문제를 설계에서 못 본다(metric_rank 전례)
            promql: "(sum by(domain)(rate(libvirt_domain_info_cpu_time_seconds_total[5m])) / on(domain) max by(domain)(libvirt_domain_info_virtual_cpus) * 100) * on(domain) group_left(instance_name, project_name) libvirt_domain_openstack_info",
            empty: false,
            series: [
              { name: "web-prod-07", projectName: "service-prod",
                points: Array.from({ length: 13 }, (_, i) => ({ ts: 1753340400 + i * 300, value: 55 + 25 * Math.sin(i / 3) + i })) },
              { name: "api-prod-02", projectName: "service-prod",
                points: Array.from({ length: 13 }, (_, i) => ({ ts: 1753340400 + i * 300, value: 40 + 10 * Math.cos(i / 2) })) },
              { name: "batch-11", projectName: "data-platform",
                points: Array.from({ length: 13 }, (_, i) => ({ ts: 1753340400 + i * 300, value: 12 + (i % 4) * 3 })) },
            ],
          }],
          followups: [],
        },
        {
          label: "metric_line — 단일 시리즈(레전드 없음)",
          answer: "최근 6h web-server-01 메모리 사용률 추이입니다.",
          widgets: [{
            type: "metric_line", title: "메모리 사용률 추이", unit: "%", range: "6h",
            promql: "libvirt_domain_memory_stats_used_percent * on(domain) group_left(instance_name, project_name) libvirt_domain_openstack_info{instance_name=\"web-server-01\"}",
            empty: false,
            series: [
              { name: "web-server-01", projectName: "service-prod",
                points: Array.from({ length: 25 }, (_, i) => ({ ts: 1753322400 + i * 900, value: 62 + 8 * Math.sin(i / 4) })) },
            ],
          }],
          followups: [],
        },
        {
          label: "threshold_banner — 임계 초과 배너",
          answer: "CPU 임계(85%)를 초과한 노드가 2대 있습니다.",
          widgets: [{ type: "threshold_banner", level: "CRIT", title: "임계 초과 노드 2대", detail: "CPU 85%↑ : web-prod-07, api-prod-02", count: 2 }],
          followups: [],
        },
        {
          label: "empty — 결과 0건",
          answer: "현재 조건에 해당하는 인스턴스를 찾을 수 없습니다.",
          widgets: [{ type: "metric_rank", title: "CPU 사용률이 높은 인스턴스", unit: "%", window: "5m", promql: "topk(5, ...)", empty: true, rows: [] }],
          followups: [],
        },
        {
          label: "위젯 없음 — 평문 폴백 (DOC/에러)",
          answer: "해당 API는 Bearer 토큰을 Authorization 헤더에 넣어 호출합니다.",
          widgets: [],
          followups: [],
        },
      ];

      const root = document.getElementById("preview");

      for (const s of scenarios) {
        const block = document.createElement("div");
        block.className = "scenario";
        const label = document.createElement("p");
        label.className = "label";
        label.textContent = s.label;
        block.append(label);

        // 실제 chat-widget.js renderMessages 와 동일한 구조로 렌더
        const row = document.createElement("div");
        row.className = "message";
        row.dataset.role = "assistant";

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.setAttribute("aria-hidden", "true");
        avatar.textContent = "C";
        row.append(avatar);

        const body = document.createElement("div");
        body.className = "msg-body";

        if (s.widgets.length > 0) {
          const cap = document.createElement("div");
          cap.className = "cap";
          cap.textContent = s.answer;
          body.append(cap);
          s.widgets.forEach((w) => {
            const node = buildWidget(w);
            if (node) body.append(mount(node));
          });
        } else {
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          bubble.textContent = s.answer;
          body.append(bubble);
        }

        if (s.followups.length > 0) {
          const wrap = document.createElement("div");
          wrap.className = "followups";
          s.followups.forEach((t) => {
            const chip = document.createElement("button");
            chip.type = "button";
            chip.className = "fu";
            chip.textContent = t;
            wrap.append(chip);
          });
          body.append(wrap);
        }

        row.append(body);
        block.append(row);
        root.append(block);
      }
    </script>
  </body>
</html>
